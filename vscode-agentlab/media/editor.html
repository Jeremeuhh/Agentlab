<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Security-Policy" content="__CSP__">
<title>AgentLab</title>
<style>
  :root{
    --ground: var(--vscode-editor-background);
    --card: var(--vscode-editorWidget-background, var(--vscode-editor-background));
    --card-2: var(--vscode-input-background, var(--vscode-editor-background));
    --panel-bg: var(--vscode-sideBar-background, var(--vscode-editor-background));
    --ink: var(--vscode-foreground);
    --muted: var(--vscode-descriptionForeground, var(--vscode-foreground));
    --hair: var(--vscode-widget-border, var(--vscode-panel-border, rgba(128,128,128,.25)));
    --line: var(--vscode-panel-border, var(--vscode-widget-border, rgba(128,128,128,.35)));
    --ring: var(--vscode-focusBorder);
    --entree: var(--vscode-charts-green, #3cc487);
    --llm: var(--vscode-charts-purple, #957dff);
    --human: var(--vscode-charts-orange, #efb04a);
    --sortie: var(--vscode-charts-blue, #5b9dff);
    --run: var(--vscode-progressBar-background, var(--vscode-charts-purple, #957dff));
    --ok: var(--vscode-charts-green, #3cc487);
    --err: var(--vscode-errorForeground, #e06060);
    --mono: var(--vscode-editor-font-family, ui-monospace, Menlo, Consolas, monospace);
    --sans: var(--vscode-font-family, system-ui, sans-serif);
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{display:flex;flex-direction:column;background:var(--ground);color:var(--ink);
    font-family:var(--sans);font-size:12px;-webkit-font-smoothing:antialiased;overflow:hidden}
  button{font:inherit;color:inherit}
  :focus-visible{outline:1px solid var(--ring);outline-offset:1px}

  /* ---- bandeau ---- */
  .top{display:flex;align-items:center;gap:6px;padding:6px 8px;
    border-bottom:1px solid var(--hair);background:var(--card);flex-shrink:0}
  .lib{flex:1;min-width:0;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    background:none;border:none;font-weight:650;font-size:12.5px;cursor:pointer;padding:4px 6px;border-radius:5px}
  .lib:hover{background:var(--card-2)}
  .rn{flex:1;min-width:0;font-family:var(--mono);font-size:12px;color:var(--ink);
    background:var(--card-2);border:1px solid var(--ring);border-radius:5px;padding:4px 6px}
  #runStatus{font-size:11px;color:var(--muted);font-family:var(--mono);
    font-variant-numeric:tabular-nums;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:40%}
  #runStatus.ok{color:var(--ok)} #runStatus.err{color:var(--err)}
  .run{background:var(--vscode-button-background);color:var(--vscode-button-foreground);
    border:none;border-radius:5px;padding:4px 10px;font-weight:600;cursor:pointer;flex-shrink:0}
  .run:hover{background:var(--vscode-button-hoverBackground)}
  .run:disabled{opacity:.5;cursor:default}
  .run.stop{background:var(--err);color:#fff}
  .run.stop:hover{background:var(--err)}
  #bMore{background:none;border:1px solid var(--hair);border-radius:5px;padding:4px 8px;cursor:pointer;flex-shrink:0}
  #bMore:hover{border-color:var(--line)}

  .banner{display:flex;gap:6px;align-items:flex-start;margin:8px 8px 0;
    background:color-mix(in srgb,var(--err) 8%,transparent);border:1px solid var(--err);
    border-radius:6px;padding:7px 9px;font-size:11px;line-height:1.4;flex-shrink:0}
  .banner code{font-family:var(--mono)}

  /* ---- liste ---- */
  .list{flex:1;overflow:auto;padding:8px}
  .card{position:relative;background:var(--card);border:1px solid var(--hair);border-radius:6px;
    margin-bottom:6px;transition:border-color 180ms ease-out, box-shadow 120ms ease-out}
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;
    border-radius:6px 0 0 6px;background:var(--nc,var(--line))}
  .card.hitl::before{background:repeating-linear-gradient(var(--nc) 0 4px,transparent 4px 8px)}
  .row{display:flex;align-items:center;gap:6px;padding:7px 9px 7px 11px;cursor:pointer;min-height:30px}
  .handle{cursor:grab;color:var(--muted);font-size:11px;padding:0 2px;user-select:none;flex-shrink:0}
  .num{font-family:var(--mono);font-size:10px;color:var(--muted);width:13px;text-align:right;flex-shrink:0}
  .mem .num{width:auto;min-width:22px}  /* « 4.1 » plus large qu'un simple chiffre */
  .ico{font-size:13px;flex-shrink:0}
  .nm{flex:1;min-width:0;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .chip{font-size:10px;flex-shrink:0}
  .chip.warn{color:var(--human)}
  /* icônes Material (SVG inline) : héritent taille (em) + couleur du texte */
  .mi{width:1.15em;height:1.15em;fill:currentColor;vertical-align:-.22em;flex:none}
  .caret{font-size:9px;color:var(--muted);flex-shrink:0;width:11px;text-align:center;
    transition:transform 120ms ease-out}
  .row[aria-expanded="true"] .caret{transform:rotate(90deg)}
  .tm{font-family:var(--mono);font-size:10px;color:var(--muted);font-variant-numeric:tabular-nums;flex-shrink:0}
  .st{width:14px;text-align:center;font-size:12px;flex-shrink:0}
  .st .sp{display:inline-block;width:9px;height:9px;border-radius:50%;
    border:2px solid color-mix(in srgb,var(--run) 35%,transparent);border-top-color:var(--run);
    animation:spin .7s linear infinite}
  .st .mk{display:inline-block;animation:pop 160ms cubic-bezier(.22,1,.36,1)}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes pop{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:scale(1)}}
  .card.running,.mem.running{border-color:var(--run);animation:pulse 1.6s ease-in-out infinite alternate}
  .card.done,.mem.done{border-color:var(--ok);animation:flashdone 420ms ease-out}
  .card.error,.mem.error{border-color:var(--err);animation:shake 200ms ease-out}
  @keyframes pulse{
    from{box-shadow:0 0 0 1px color-mix(in srgb,var(--run) 25%,transparent)}
    to{box-shadow:0 0 0 3px color-mix(in srgb,var(--run) 60%,transparent)}}
  @keyframes flashdone{
    0%{box-shadow:0 0 0 3px color-mix(in srgb,var(--ok) 60%,transparent)}
    100%{box-shadow:0 0 0 0 transparent}}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}
  .before{box-shadow:0 -2px 0 0 var(--ring)!important}
  .after{box-shadow:0 2px 0 0 var(--ring)!important}

  /* ---- membres d'un groupe ---- */
  .members{padding-bottom:2px}
  .mem{position:relative;margin:0 8px 6px 28px;background:var(--card-2);
    border:1px solid var(--hair);border-radius:6px;
    transition:border-color 180ms ease-out, box-shadow 120ms ease-out}
  .mem .row{padding:5px 8px;min-height:26px}
  .madd{margin:0 8px 8px 28px;font-size:11px;background:none;border:1px dashed var(--line);
    border-radius:5px;padding:3px 9px;cursor:pointer;color:var(--muted)}
  .madd:hover{color:var(--ink);border-color:var(--ring)}

  /* ---- barre sujet ---- */
  .subbar{display:flex;align-items:center;gap:6px;padding:6px 8px;
    border-bottom:1px solid var(--hair);background:var(--card);flex-shrink:0}
  .subbar .subico{font-size:13px;flex-shrink:0}
  .subbar input{flex:1;min-width:0;font-family:var(--mono);font-size:12px;color:var(--ink);
    background:var(--card-2);border:1px solid var(--hair);border-radius:5px;padding:5px 8px}
  .subbar input:focus-visible{outline:none;border-color:var(--ring);
    box-shadow:0 0 0 2px color-mix(in srgb,var(--ring) 30%,transparent)}

  /* ---- éditeur déplié ---- */
  .ed{display:flex;flex-direction:column;gap:6px;padding:8px 10px 10px 31px;
    border-top:1px dashed var(--hair)}
  .mem .ed{padding-left:10px}
  .ed label{font-size:9.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:700}
  .ed input[type=text],.ed textarea{width:100%;font-family:var(--mono);font-size:12px;color:var(--ink);
    background:var(--card-2);border:1px solid var(--hair);border-radius:5px;padding:6px 8px}
  .ed textarea{min-height:clamp(320px,68vh,680px);resize:vertical;line-height:1.5}
  .ed textarea.ePrompt{font-size:12.5px}
  .ed input:focus-visible,.ed textarea:focus-visible{outline:none;border-color:var(--ring);
    box-shadow:0 0 0 2px color-mix(in srgb,var(--ring) 30%,transparent)}
  .check{display:flex;gap:6px;align-items:center;font-size:11.5px;cursor:pointer;
    text-transform:none;letter-spacing:0}
  .check input{accent-color:var(--sortie);width:14px;height:14px}
  .note{font-size:10.5px;color:var(--muted);line-height:1.45;text-wrap:pretty}
  .note code,.note kbd{font-family:var(--mono);font-size:9.5px;background:var(--card-2);
    border:1px solid var(--hair);border-radius:3px;padding:0 3px}
  details.out{border:1px solid var(--hair);border-radius:5px;background:var(--card-2);overflow:hidden}
  details.out>summary{cursor:pointer;padding:6px 8px;font-size:11px;font-weight:600;list-style:none}
  details.out>summary::-webkit-details-marker{display:none}
  details.out pre{margin:0;padding:8px;border-top:1px solid var(--hair);font-family:var(--mono);
    font-size:10.5px;line-height:1.5;white-space:pre-wrap;word-break:break-word;max-height:240px;overflow:auto}
  .acts{display:flex;gap:5px;margin-top:2px;flex-wrap:wrap}
  .acts button{font-size:11px;background:var(--card-2);border:1px solid var(--hair);
    border-radius:5px;padding:4px 8px;cursor:pointer}
  .acts button:hover{border-color:var(--line)}
  .acts .del{color:var(--err);border-color:color-mix(in srgb,var(--err) 40%,transparent);margin-left:auto}

  /* ---- pied ---- */
  .foot{padding:8px;border-top:1px solid var(--hair);background:var(--card);flex-shrink:0}
  #bAdd{width:100%;border:1px dashed var(--line);background:none;border-radius:6px;
    padding:7px;font-size:12px;cursor:pointer;color:var(--muted)}
  #bAdd:hover{color:var(--ink);border-color:var(--ring)}

  /* ---- menu / accueil / toast / hitl ---- */
  .menu{position:fixed;z-index:30;background:var(--card);border:1px solid var(--hair);
    border-radius:6px;box-shadow:0 4px 16px color-mix(in srgb,black 25%,transparent);
    padding:4px;min-width:180px;max-width:92vw;max-height:60vh;overflow:auto;
    display:flex;flex-direction:column}
  .menu button{display:flex;justify-content:space-between;gap:10px;align-items:center;
    text-align:left;background:none;border:none;border-radius:4px;padding:6px 8px;
    font-size:12px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .menu button:hover{background:var(--card-2)}
  .menu .sub{font-size:10px;color:var(--muted);font-family:var(--mono);flex-shrink:0}
  .menu .mlbl{display:flex;align-items:center;gap:8px;min-width:0}
  .menu .mlbl>span{overflow:hidden;text-overflow:ellipsis}
  .menu .sep{height:1px;background:var(--hair);margin:4px 2px}
  .welcome{margin:24px auto;text-align:center;max-width:210px;color:var(--muted);
    font-size:12px;line-height:1.5;text-wrap:balance;border:1px dashed var(--line);
    border-radius:8px;padding:16px 14px}
  .welcome button{margin-top:10px;background:var(--vscode-button-background);
    color:var(--vscode-button-foreground);border:none;border-radius:5px;
    padding:5px 11px;font-size:12px;cursor:pointer}
  .toast{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);background:var(--ink);
    color:var(--ground);font-size:11.5px;padding:7px 12px;border-radius:6px;z-index:40;opacity:0;
    transition:opacity .2s;pointer-events:none;max-width:88vw;text-align:center}
  .toast.show{opacity:.95}
  /* feuille HITL du bas : sélecteurs sur #hitl (l'élément a id="hitl"), pas .hitl —
     sinon la carte d'une étape HITL (class="card hitl") héritait position:fixed et
     disparaissait hors écran. */
  #hitl{position:fixed;left:0;right:0;bottom:0;z-index:20;background:var(--panel-bg);
    border-top:2px solid var(--human);border-radius:10px 10px 0 0;padding:12px 12px 14px;
    max-height:60%;overflow:auto;box-shadow:0 -8px 24px color-mix(in srgb,black 22%,transparent);
    transform:translateY(100%);transition:transform 200ms ease-out}
  #hitl.show{transform:translateY(0)}
  #hitl h2{margin:0 0 4px;font-size:12.5px;font-weight:650}
  #hitl .hsub{font-size:11px;color:var(--muted);margin-bottom:8px;font-variant-numeric:tabular-nums}
  #hitl label{display:block;font-size:11px;color:var(--ink);margin:8px 0 4px}
  #hitl textarea{width:100%;font-family:var(--mono);font-size:12px;color:var(--ink);
    background:var(--card-2);border:1px solid var(--hair);border-radius:5px;padding:6px 8px;
    resize:vertical;min-height:40px}
  #hitl textarea:focus-visible{outline:none;border-color:var(--human);
    box-shadow:0 0 0 2px color-mix(in srgb,var(--human) 30%,transparent)}
  #hitl .hacts{display:flex;gap:8px;margin-top:10px}
  #hitl .go{background:var(--vscode-button-background);color:var(--vscode-button-foreground);
    border:none;border-radius:5px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer}
  #hitl .go:hover{background:var(--vscode-button-hoverBackground)}
  #hitl .cancel{background:transparent;border:1px solid var(--hair);color:var(--muted);
    border-radius:5px;padding:6px 10px;font-size:12px;cursor:pointer}

  @media (prefers-reduced-motion:reduce){
    .card.running,.card.done,.card.error,.mem.running,.mem.done,.mem.error,.st .mk{animation:none!important}
    *{transition-duration:.01ms!important}
    .st .sp{animation:none;border-top-color:currentColor}
    #hitl{transition:none}
  }
</style>
</head>
<body>
<header class="top">
  <button id="bLib" class="lib" title="Pipelines (charger / nouveau)">pipeline ▾</button>
  <button id="bRun" class="run" title="Lancer le pipeline"><svg class="mi" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg> Run</button>
  <button id="bMore" title="Sauver, exporter, renommer…">⋯</button>
</header>
<div class="subbar">
  <span class="subico" title="Sujet injecté au départ du pipeline"><svg class="mi" viewBox="0 0 24 24" aria-hidden="true"><path d="M9 21c0 .55.45 1 1 1h4c.55 0 1-.45 1-1v-1H9v1zm3-19C8.14 2 5 5.14 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.86-3.14-7-7-7z"/></svg></span>
  <input id="entree" type="text" spellcheck="false" placeholder="Sujet / question du run…">
  <span id="runStatus"></span>
</div>
<div class="banner" id="banner" hidden><svg class="mi" viewBox="0 0 24 24" aria-hidden="true"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg><span><code>claude</code> introuvable dans le PATH — l'édition marche, le <b>lancement est désactivé</b>.</span></div>
<main class="list" id="list"></main>
<footer class="foot"><button id="bAdd">＋ étape</button></footer>
<div class="menu" id="menu" hidden></div>
<div class="hitl" id="hitl" role="dialog" aria-modal="true" aria-label="Questions de cadrage" hidden></div>
<div class="toast" id="toast"></div>

<script nonce="__NONCE__">
"use strict";
const vscode = acquireVsCodeApi();

/* ---------- icônes Material Symbols (Apache-2.0), paths 24×24 inline ----------
   voir NOTICE.md pour l'attribution. ic(n) → <svg> qui hérite couleur/taille. */
const ICONS = {
  smart_toy:"M20 9V7c0-1.1-.9-2-2-2h-3c0-1.66-1.34-3-3-3S9 3.34 9 5H6c-1.1 0-2 .9-2 2v2c-1.66 0-3 1.34-3 3s1.34 3 3 3v4c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2v-4c1.66 0 3-1.34 3-3s-1.34-3-3-3zM7.5 11.5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5S9.83 13 9 13s-1.5-.67-1.5-1.5zM16 17H8v-2h8v2zm-1-4c-.83 0-1.5-.67-1.5-1.5S14.17 10 15 10s1.5.67 1.5 1.5S15.83 13 15 13z",
  lightbulb:"M9 21c0 .55.45 1 1 1h4c.55 0 1-.45 1-1v-1H9v1zm3-19C8.14 2 5 5.14 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.86-3.14-7-7-7z",
  person:"M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z",
  description:"M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z",
  account_tree:"M22 11V3h-7v3H9V3H2v8h7V8h2v10h4v3h7v-8h-7v3h-2V8h2v3z",
  language:"M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zm6.93 6h-2.95c-.32-1.25-.78-2.45-1.38-3.56 1.84.63 3.37 1.91 4.33 3.56zM12 4.04c.83 1.2 1.48 2.53 1.91 3.96h-3.82c.43-1.43 1.08-2.76 1.91-3.96zM4.26 14C4.1 13.36 4 12.69 4 12s.1-1.36.26-2h3.38c-.08.66-.14 1.32-.14 2 0 .68.06 1.34.14 2H4.26zm.82 2h2.95c.32 1.25.78 2.45 1.38 3.56-1.84-.63-3.37-1.9-4.33-3.56zm2.95-8H5.08c.96-1.66 2.49-2.93 4.33-3.56C8.81 5.55 8.35 6.75 8.03 8zM12 19.96c-.83-1.2-1.48-2.53-1.91-3.96h3.82c-.43 1.43-1.08 2.76-1.91 3.96zM14.34 14H9.66c-.09-.66-.16-1.32-.16-2 0-.68.07-1.35.16-2h4.68c.09.65.16 1.32.16 2 0 .68-.07 1.34-.16 2zm.25 5.56c.6-1.11 1.06-2.31 1.38-3.56h2.95c-.96 1.65-2.49 2.93-4.33 3.56zM16.36 14c.08-.66.14-1.32.14-2 0-.68-.06-1.34-.14-2h3.38c.16.64.26 1.31.26 2s-.1 1.36-.26 2h-3.38z",
  extension:"M20.5 11H19V7c0-1.1-.9-2-2-2h-4V3.5C13 2.12 11.88 1 10.5 1S8 2.12 8 3.5V5H4c-1.1 0-1.99.9-1.99 2v3.8H3.5c1.49 0 2.7 1.21 2.7 2.7s-1.21 2.7-2.7 2.7H2V20c0 1.1.9 2 2 2h3.8v-1.5c0-1.49 1.21-2.7 2.7-2.7 1.49 0 2.7 1.21 2.7 2.7V22H17c1.1 0 2-.9 2-2v-4h1.5c1.38 0 2.5-1.12 2.5-2.5S21.88 11 20.5 11z",
  save:"M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z",
  play_arrow:"M8 5v14l11-7z",
  stop:"M6 6h12v12H6z",
  edit:"M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z",
  warning:"M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z",
};
function ic(n){ return '<svg class="mi" viewBox="0 0 24 24" aria-hidden="true"><path d="'+ICONS[n]+'"/></svg>'; }

/* ---------- modèle : pipeline = liste d'étapes ----------
   étape = {kind:"entree"|"llm"|"hitl"|"sortie", name, prompt?, web?}
        ou {kind:"group", name, items:[{name,prompt,web}]}
   compile() → {nodes,edges} (format moteur, inchangé) : chaque étape reçoit
   la ou les sorties de l'étape précédente ; un groupe = N agents en parallèle
   dont les sorties convergent vers l'étape suivante. */
const KINDS = {
  entree:{ico:ic("lightbulb"),label:"Entrée",c:"var(--entree)"},
  llm:   {ico:ic("smart_toy"),label:"Agent LLM",c:"var(--llm)"},
  hitl:  {ico:ic("person"),label:"Humain",c:"var(--human)"},
  sortie:{ico:ic("description"),label:"Sortie",c:"var(--sortie)"},
  group: {ico:ic("account_tree"),label:"Groupe //",c:"var(--llm)"},
};

const EXEMPLE={name:"ideas",steps:[
  {kind:"entree",name:"Idée"},
  {kind:"llm",name:"Questionnaire",web:false,prompt:'Génère 5 à 7 questions de cadrage SPÉCIFIQUES au domaine de l\'idée amont. Réponds UNIQUEMENT : {"questions":["…"]}'},
  {kind:"hitl",name:"Cadrage"},
  {kind:"group",name:"Analyse",items:[
    {name:"Marché",web:false,prompt:"Section « Marché » : TAM/SAM/SOM estimés, concurrents, tendances, positionnement. Markdown, ###."},

  {kind:"llm",name:"Synthèse",web:false,prompt:"À partir des sections amont, rédige le dossier complet : reprends chaque section, puis croise-les (cohérences, tensions, risques) et conclus par une reco go/no-go nuancée. Markdown."},

let state, open=null, running=false, claudeMissing=false;
let AGENTS=[], PIPES=[];
let runMap={}, stKey={}, outKey={}, tmKey={}, doneN=0, totalN=0;
const undo=[], redo=[];
const list=document.getElementById("list"), bLib=document.getElementById("bLib");
const bRun=document.getElementById("bRun"), bAdd=document.getElementById("bAdd");
const entreeInput=document.getElementById("entree");
entreeInput.addEventListener("input",()=>{state.entree=entreeInput.value;persist();});

function persist(){ vscode.setState(state); }
function loadState(){ const s=vscode.getState();
  if(s&&Array.isArray(s.steps)) return s;
  if(s&&Array.isArray(s.nodes)) return Object.assign(decompile(s),{entree:""});
  return null; }
function snapshot(){ const s=JSON.stringify(state);
  if(undo[undo.length-1]===s)return; undo.push(s); if(undo.length>80)undo.shift(); redo.length=0; }
function doUndo(){ if(!undo.length)return; redo.push(JSON.stringify(state));
  state=JSON.parse(undo.pop()); open=null; persist(); render(); }
function doRedo(){ if(!redo.length)return; undo.push(JSON.stringify(state));
  state=JSON.parse(redo.pop()); open=null; persist(); render(); }
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function toast(t){ const el=document.getElementById("toast"); el.textContent=t; el.classList.add("show");
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove("show"),2200); }
function setStatus(t,cls){ const s=document.getElementById("runStatus"); s.textContent=t||""; s.className=cls||""; }
function keyOf(i,k){ return k==null?String(i):i+"."+k; }
function tmTxt(key){ const t=tmKey[key]; return t&&t.ms!=null?(t.ms/1000).toFixed(1)+"s":""; }
function stMark(st){ return st==="running"?'<span class="sp"></span>'
  : st==="done"?'<span class="mk" style="color:var(--ok)">✓</span>'
  : st==="error"?'<span class="mk" style="color:var(--err)">✗</span>':''; }

/* ---------- compile / décompile ---------- */
let runMapBuild={};
function compile(){
  const nodes=[],edges=[]; runMapBuild={};
  let prev=[];
  state.steps.forEach((s,i)=>{
    const cur=[];
    const push=(type,name,extra,k)=>{ const id="s"+nodes.length;
      nodes.push(Object.assign({id,type,name,x:60+(k||0)*210,y:40+i*150},extra));
      runMapBuild[id]=keyOf(i,k); cur.push(id); };
    if(s.kind==="group") s.items.forEach((it,k)=>push("llm",it.name||"Agent",{prompt:it.prompt||"",web:!!it.web,full:!!it.full},k));
    else if(s.kind==="llm") push("llm",s.name||"Agent",{prompt:s.prompt||"",web:!!s.web,full:!!s.full});
    else push(s.kind,s.name||KINDS[s.kind].label,{});
    for(const p of prev)for(const c of cur)edges.push([p,c]);
    prev=cur;
  });
  return {name:state.name||"pipeline",nodes,edges,steps:structuredClone(state.steps)};
}
function decompile(data){ // ancien format {nodes,edges} → étapes par couches topo
  const nodes=data.nodes||[], preds={}, layer={};
  nodes.forEach(n=>{preds[n.id]=[];layer[n.id]=0;});
  (data.edges||[]).forEach(([a,b])=>{ if(preds[b])preds[b].push(a); });
  let ch=true,g=0;
  while(ch&&g++<nodes.length+2){ ch=false;
    for(const n of nodes){ const L=preds[n.id].length?Math.max(...preds[n.id].map(p=>layer[p]+1)):0;
      if(L!==layer[n.id]){layer[n.id]=L;ch=true;} } }
  const byL={}; nodes.forEach(n=>{(byL[layer[n.id]]=byL[layer[n.id]]||[]).push(n);});
  const steps=[];
  Object.keys(byL).map(Number).sort((a,b)=>a-b).forEach(L=>{
    const ns=byL[L], llms=ns.filter(n=>n.type==="llm"), rest=ns.filter(n=>n.type!=="llm");
    rest.forEach(n=>steps.push({kind:n.type,name:n.name}));
    if(llms.length>1) steps.push({kind:"group",name:"Groupe",items:llms.map(n=>({name:n.name,prompt:n.prompt||"",web:!!n.web}))});
    else llms.forEach(n=>steps.push({kind:"llm",name:n.name,prompt:n.prompt||"",web:!!n.web}));
  });
  return {name:data.name||"pipeline",steps};
}

/* ---------- rendu ---------- */
function render(){
  bLib.textContent=(state.name||"pipeline")+" ▾";
  entreeInput.value=state.entree||"";
  bRun.innerHTML=running?ic("stop")+" Stop":ic("play_arrow")+" Run";
  bRun.classList.toggle("stop",running);
  bRun.disabled=claudeMissing&&!running;
  list.innerHTML="";
  state.steps.forEach((s,i)=>list.appendChild(card(s,i)));
  if(!state.steps.length){
    const w=document.createElement("div"); w.className="welcome";
    w.innerHTML="Pipeline vide.<br>Ajoute une étape avec ＋, ou charge l'exemple.<br>";
    const b=document.createElement("button"); b.textContent="Charger l'exemple";
    b.onclick=()=>loadPipe(EXEMPLE); w.appendChild(b); list.appendChild(w);
  }
}
function groupState(i,s){
  const sts=s.items.map((_,k)=>stKey[keyOf(i,k)]);
  if(sts.some(x=>x==="running"))return "running";
  if(sts.length&&sts.every(x=>x==="done"||x==="error"))return sts.includes("error")?"error":"done";
  return null;
}
function card(s,i){
  const K=KINDS[s.kind]||KINDS.llm, el=document.createElement("section");
  el.className="card "+s.kind; el.dataset.key=String(i);
  el.style.setProperty("--nc",K.c);
  const st=s.kind==="group"?groupState(i,s):stKey[String(i)];
  if(st)el.classList.add(st);
  const warn=s.kind==="llm"&&!(s.prompt||"").trim()
    ?'<span class="chip warn" title="Prompt vide — un prompt par défaut sera utilisé">'+ic('warning')+'</span>':'';
  el.innerHTML=`<div class="row" role="button" tabindex="0"
      aria-expanded="${!!(open&&open.i===i&&open.k==null)}"
      aria-label="${esc(s.name||K.label)} — ${K.label}${st?" — "+st:""}">
    <span class="handle" draggable="true" title="Glisser pour réordonner">⠿</span>
    <span class="num">${i+1}</span><span class="ico">${K.ico}</span>
    <span class="nm">${esc(s.name||K.label)}</span>
    ${s.kind==="llm"&&s.web?'<span class="chip">'+ic('language')+'</span>':''}${s.kind==="llm"&&s.full?'<span class="chip" title="Setup Claude Code complet">'+ic('extension')+'</span>':''}${warn}
    <span class="tm">${s.kind==="group"?"":tmTxt(String(i))}</span>
    <span class="st">${stMark(st)}</span><span class="caret">▸</span></div>`;
  const row=el.querySelector(".row");
  row.addEventListener("click",()=>{ open=(open&&open.i===i&&open.k==null)?null:{i}; render(); });
  row.addEventListener("keydown",e=>{ if(e.key==="Enter"||e.key===" "){e.preventDefault();row.click();} });
  if(s.kind==="group"){
    const g=document.createElement("div"); g.className="members";
    s.items.forEach((it,k)=>g.appendChild(member(s,i,it,k)));
    el.appendChild(g);
    const add=document.createElement("button"); add.className="madd"; add.textContent="＋ agent";
    add.onclick=e=>{e.stopPropagation();menuAddMember(add,i);};
    el.appendChild(add);
  }
  if(open&&open.i===i&&open.k==null) el.appendChild(editor(s,i));
  dndCard(el,i);
  return el;
}
function member(s,i,it,k){
  const key=keyOf(i,k), st=stKey[key];
  const w=document.createElement("div"); w.className="mem"; w.dataset.key=key;
  if(st)w.classList.add(st);
  const warn=!(it.prompt||"").trim()
    ?'<span class="chip warn" title="Prompt vide — un prompt par défaut sera utilisé">'+ic('warning')+'</span>':'';
  w.innerHTML=`<div class="row" role="button" tabindex="0"
      aria-expanded="${!!(open&&open.i===i&&open.k===k)}"
      aria-label="${esc(it.name||"Agent")} — agent du groupe${st?" — "+st:""}">
    <span class="handle" draggable="true" title="Glisser pour réordonner">⠿</span>
    <span class="num">${i+1}.${k+1}</span><span class="ico">${ic('smart_toy')}</span><span class="nm">${esc(it.name||"Agent")}</span>
    ${it.web?'<span class="chip">'+ic('language')+'</span>':''}${it.full?'<span class="chip" title="Setup Claude Code complet">'+ic('extension')+'</span>':''}${warn}
    <span class="tm">${tmTxt(key)}</span><span class="st">${stMark(st)}</span><span class="caret">▸</span></div>`;
  const row=w.querySelector(".row");
  row.addEventListener("click",e=>{e.stopPropagation();
    open=(open&&open.i===i&&open.k===k)?null:{i,k}; render();});
  row.addEventListener("keydown",e=>{ if(e.key==="Enter"||e.key===" "){e.preventDefault();row.click();} });
  if(open&&open.i===i&&open.k===k) w.appendChild(editor(s,i,k));
  dndMember(w,i,k);
  return w;
}
function editor(s,i,k){
  const isM=k!=null, o=isM?s.items[k]:s;
  const kind=isM?"llm":s.kind;
  const d=document.createElement("div"); d.className="ed";
  let h='<label>Nom</label><input type="text" class="eName" spellcheck="false">';
  if(kind==="llm") h+='<label>Prompt</label><textarea class="ePrompt" spellcheck="false"></textarea>'
    +'<label class="check"><input type="checkbox" class="eWeb"> '+ic('language')+' WebSearch autorisé</label>'
    +'<label class="check"><input type="checkbox" class="eFull"> '+ic('extension')+' Setup Claude Code complet</label>'
    +'<div class="note">Charge <b>skills, plugins, MCP et sous-agents</b> de ta config Claude Code, et laisse l\'agent utiliser tous les outils (Bash, Edit, MCP…) <b>sans confirmation</b>. Puissant mais à réserver aux pipelines de confiance. Décoché : agent en bac à sable (texte + WebSearch).</div>';
  if(kind==="hitl") h+='<div class="note">Met le run en pause : si l\'étape précédente produit <code>{"questions":[…]}</code> elles te sont posées, sinon commentaire libre. <kbd>Ctrl/Cmd+Entrée</kbd> pour continuer.</div>';
  if(kind==="sortie") h+='<div class="note">Écrit un <code>.md</code> (sorties de l\'étape précédente) à la racine du dossier ouvert.</div>';
  if(kind==="group") h+='<div class="note">Les agents du groupe tournent <b>en parallèle</b> sur l\'étape précédente ; leurs sorties <b>fusionnent</b> dans l\'étape suivante.</div>';
  if(kind==="entree") h+='<div class="note">Point de départ du pipeline. Écris le sujet du run dans la <b>barre en haut</b> ('+ic('lightbulb')+').</div>';
  const out=outKey[keyOf(i,k)];
  if(out!=null) h+='<details class="out"><summary>Dernière sortie</summary><pre>'+esc(String(out))+'</pre></details>';
  h+='<div class="acts"><button class="mv" data-d="-1" title="Monter">↑</button>'
    +'<button class="mv" data-d="1" title="Descendre">↓</button>'
    +(kind==="llm"?'<button class="agsave" title="Enregistrer dans la bibliothèque d\'agents">'+ic('save')+' agent</button>':'')
    +'<button class="del">Supprimer</button></div>';
  d.innerHTML=h;
  d.addEventListener("click",e=>e.stopPropagation());
  const nm=d.querySelector(".eName"); nm.value=o.name||"";
  nm.addEventListener("focus",snapshot);
  nm.addEventListener("input",()=>{o.name=nm.value;persist();
    const row=d.parentElement&&d.parentElement.querySelector(".nm");
    if(row)row.textContent=o.name||KINDS[kind].label;});
  if(kind==="llm"){
    const p=d.querySelector(".ePrompt"), w=d.querySelector(".eWeb"), fu=d.querySelector(".eFull");
    p.value=o.prompt||""; w.checked=!!o.web; fu.checked=!!o.full;
    p.addEventListener("focus",snapshot);
    p.addEventListener("input",()=>{o.prompt=p.value;persist();});
    w.addEventListener("change",()=>{snapshot();o.web=w.checked;persist();render();});
    fu.addEventListener("change",()=>{snapshot();o.full=fu.checked;persist();render();});
    const ag=d.querySelector(".agsave");
    if(ag)ag.onclick=()=>vscode.postMessage({type:"saveAgent",
      data:{name:o.name||"Agent",prompt:o.prompt||"",web:!!o.web,full:!!o.full}});
  }
  d.querySelectorAll(".mv").forEach(b=>b.onclick=()=>{
    isM?moveMember(i,k,+b.dataset.d):move(i,+b.dataset.d);});
  d.querySelector(".del").onclick=()=>{
    if(running)return toast("Run en cours");
    snapshot();
    if(isM){ s.items.splice(k,1); if(!s.items.length)state.steps.splice(i,1); }
    else state.steps.splice(i,1);
    open=null; persist(); render();};
  return d;
}
function move(i,d){ if(running)return toast("Run en cours");
  const j=i+d; if(j<0||j>=state.steps.length)return;
  snapshot(); const [s]=state.steps.splice(i,1); state.steps.splice(j,0,s);
  if(open&&open.i===i)open.i=j; persist(); render(); }
function moveMember(i,k,d){ if(running)return toast("Run en cours");
  const s=state.steps[i], j=k+d; if(j<0||j>=s.items.length)return;
  snapshot(); const [m]=s.items.splice(k,1); s.items.splice(j,0,m);
  if(open&&open.i===i&&open.k===k)open.k=j; persist(); render(); }

/* ---------- drag & drop (réordonner) ---------- */
let dragCtx=null;
function clearDnd(){ document.querySelectorAll(".before,.after").forEach(x=>x.classList.remove("before","after")); }
function dndCard(el,i){
  const h=el.querySelector(":scope>.row .handle");
  h.addEventListener("dragstart",e=>{dragCtx={i};
    e.dataTransfer.setData("text/plain","");e.dataTransfer.effectAllowed="move";});
  el.addEventListener("dragover",e=>{ if(!dragCtx||dragCtx.k!=null)return; e.preventDefault();
    const r=el.getBoundingClientRect(), lower=e.clientY>=r.top+r.height/2;
    el.classList.toggle("before",!lower); el.classList.toggle("after",lower);});
  el.addEventListener("dragleave",()=>el.classList.remove("before","after"));
  el.addEventListener("drop",e=>{ if(!dragCtx||dragCtx.k!=null)return; e.preventDefault();
    const r=el.getBoundingClientRect();
    let j=i+(e.clientY>=r.top+r.height/2?1:0);
    const from=dragCtx.i; clearDnd(); dragCtx=null;
    if(running)return toast("Run en cours");
    if(j>from)j--; if(j===from)return;
    snapshot(); const [s]=state.steps.splice(from,1); state.steps.splice(j,0,s);
    open=null; persist(); render();});
  el.addEventListener("dragend",()=>{clearDnd();dragCtx=null;});
}
function dndMember(w,i,k){
  const h=w.querySelector(".handle");
  h.addEventListener("dragstart",e=>{dragCtx={i,k};e.stopPropagation();
    e.dataTransfer.setData("text/plain","");e.dataTransfer.effectAllowed="move";});
  w.addEventListener("dragover",e=>{ if(!dragCtx||dragCtx.k==null||dragCtx.i!==i)return;
    e.preventDefault();e.stopPropagation();
    const r=w.getBoundingClientRect(), lower=e.clientY>=r.top+r.height/2;
    w.classList.toggle("before",!lower); w.classList.toggle("after",lower);});
  w.addEventListener("dragleave",()=>w.classList.remove("before","after"));
  w.addEventListener("drop",e=>{ if(!dragCtx||dragCtx.k==null||dragCtx.i!==i)return;
    e.preventDefault();e.stopPropagation();
    const r=w.getBoundingClientRect();
    let j=k+(e.clientY>=r.top+r.height/2?1:0);
    const from=dragCtx.k; clearDnd(); dragCtx=null;
    if(running)return toast("Run en cours");
    if(j>from)j--; if(j===from)return;
    snapshot(); const s=state.steps[i];
    const [m]=s.items.splice(from,1); s.items.splice(j,0,m);
    open=null; persist(); render();});
  w.addEventListener("dragend",()=>{clearDnd();dragCtx=null;});
}

/* ---------- menus ---------- */
let menuOpen=false;
function openMenu(anchor,items){
  const m=document.getElementById("menu");
  m.innerHTML="";
  items.forEach(it=>{
    if(it==="-"){const s=document.createElement("div");s.className="sep";m.appendChild(s);return;}
    const b=document.createElement("button");
    const left=document.createElement("span"); left.className="mlbl";
    if(it.ico) left.insertAdjacentHTML("beforeend",ic(it.ico));
    const t=document.createElement("span"); t.textContent=it.label; left.appendChild(t);
    b.appendChild(left);
    if(it.sub){const s=document.createElement("span");s.className="sub";s.textContent=it.sub;b.appendChild(s);}
    b.onclick=()=>{closeMenu();it.on();};
    m.appendChild(b);
  });
  m.hidden=false; menuOpen=true;
  const r=anchor.getBoundingClientRect();
  m.style.top=Math.max(4,Math.min(r.bottom+4,innerHeight-m.offsetHeight-8))+"px";
  m.style.left=Math.max(4,Math.min(r.left,innerWidth-m.offsetWidth-8))+"px";
}
function closeMenu(){ document.getElementById("menu").hidden=true; menuOpen=false; }
document.addEventListener("pointerdown",e=>{
  if(menuOpen&&!document.getElementById("menu").contains(e.target))closeMenu();
},true);

bLib.onclick=()=>openMenu(bLib,[
  ...PIPES.map(p=>({label:p.data.name||p.file,

document.getElementById("bMore").onclick=()=>openMenu(document.getElementById("bMore"),[

]);
bAdd.onclick=()=>{

function menuAddMember(anchor,i){
  openMenu(anchor,[
    {ico:"smart_toy",label:"Nouvel agent",on:()=>addMember(i,{name:"Agent",prompt:"",web:false})},
    ...(AGENTS.length?["-"]:[]),

      on:()=>addMember(i,{name:a.data.name||"Agent",prompt:a.data.prompt||"",web:!!a.data.web,full:!!a.data.full})})),

function addStep(s,at){ if(running)return toast("Run en cours");
  snapshot();
  let j=at!=null?at:state.steps.length;
  if(at==null&&j&&state.steps[j-1].kind==="sortie")j--; // insérer avant la Sortie finale
  state.steps.splice(j,0,s); open={i:j}; persist(); render();
  const el=document.querySelector('[data-key="'+j+'"]'); if(el)el.scrollIntoView({block:"center"});
}
function addMember(i,it){ if(running)return toast("Run en cours");
  snapshot(); const s=state.steps[i]; s.items.push(it);
  open={i,k:s.items.length-1}; persist(); render(); }
function loadPipe(data){
  if(!data||(!Array.isArray(data.steps)&&!Array.isArray(data.nodes)))return toast("Pipeline invalide");
  if(running)return toast("Run en cours");
  snapshot();
  const st=Array.isArray(data.steps)
    ?{name:data.name||"pipeline",steps:structuredClone(data.steps)}
    :decompile(data);
  state=Object.assign({entree:state.entree||""},st);
  stKey={};outKey={};tmKey={};open=null; persist(); render(); setStatus("");
  toast("Chargé : "+(state.name||"pipeline")+" · Ctrl+Z pour revenir");
}
function newPipe(){ if(running)return toast("Run en cours");
  snapshot();
  state={name:"pipeline",entree:"",steps:[{kind:"entree",name:"Idée"},{kind:"sortie",name:"Rapport"}]};
  stKey={};outKey={};tmKey={};open=null; persist(); render(); setStatus(""); }
function save(){ vscode.postMessage({type:"savePipeline",name:state.name||"pipeline",pipeline:compile()}); }
function rename(){
  const inp=document.createElement("input"); inp.type="text"; inp.className="rn";
  inp.value=state.name||"pipeline"; inp.spellcheck=false;
  bLib.replaceWith(inp); inp.focus(); inp.select();
  const fin=()=>{ snapshot(); state.name=inp.value.trim()||"pipeline";
    persist(); inp.replaceWith(bLib); render(); };
  inp.addEventListener("blur",fin);
  inp.addEventListener("keydown",e=>{ if(e.key==="Enter"||e.key==="Escape")inp.blur(); });
}

/* ---------- exécution live ---------- */
bRun.onclick=()=>{
  if(running){ vscode.postMessage({type:"stop"}); setStatus("arrêt…",""); return; }
  if(claudeMissing)return;
  const entree=(state.entree||"").trim();
  if(!entree){ toast("Écris le sujet dans la barre en haut"); entreeInput.focus(); return; }
  if(!state.steps.length)return toast("Pipeline vide");
  const pipeline=compile(); runMap=runMapBuild;
  stKey={};outKey={};tmKey={};doneN=0;totalN=pipeline.nodes.length;
  running=true; setStatus("▶ 0/"+totalN,""); render();
  vscode.postMessage({type:"run",pipeline,entree});
};
function onEvent(ev){
  const key=ev.id!=null?runMap[ev.id]:null;
  if(ev.type==="pipeline_start"){ doneN=0; setStatus("▶ 0/"+totalN,""); }
  else if(ev.type==="node_running"){ stKey[key]="running"; tmKey[key]={start:Date.now()};
    setStatus("▶ "+doneN+"/"+totalN+" · "+ev.name+"…",""); render(); }
  else if(ev.type==="node_done"){ stKey[key]="done"; outKey[key]=ev.output;
    if(tmKey[key])tmKey[key].ms=Date.now()-tmKey[key].start; doneN++;
    setStatus("▶ "+doneN+"/"+totalN,""); render(); }
  else if(ev.type==="node_error"){ stKey[key]="error"; outKey[key]="⚠️ "+ev.error;
    if(tmKey[key])tmKey[key].ms=Date.now()-tmKey[key].start; doneN++;
    setStatus("▶ "+doneN+"/"+totalN+" · erreur","err"); render(); }
  else if(ev.type==="pipeline_done"){ setStatus("✓ terminé ("+totalN+")","ok"); }
  else if(ev.type==="error"){ setStatus("⚠️ "+(ev.message||"erreur"),"err"); }
  else if(ev.type==="fatal"){ setStatus("⚠️ "+ev.error,"err"); toast("Échec : "+ev.error); }
  else if(ev.type==="stopped"){
    for(const k in stKey)if(stKey[k]==="running")delete stKey[k];
    if(hitlCtx)closeHitl();
    setStatus("■ arrêté",""); toast("Run arrêté"); }
  else if(ev.type==="closed"){ running=false; render();
    const s=document.getElementById("runStatus");
    if(!s.textContent)setStatus("terminé",""); }
}

/* ---------- HITL interactif ---------- */
let hitlCtx=null;
function showHitl(payload){
  hitlCtx=payload;
  const el=document.getElementById("hitl");
  const qs=Array.isArray(payload.questions)?payload.questions:null;
  const fields=qs
    ?qs.map((q,i)=>'<label for="hq'+i+'">'+esc(q)+'</label><textarea id="hq'+i+'" data-i="'+i+'" spellcheck="false"></textarea>').join("")
    :'<label for="hq0">Commentaire libre (optionnel)</label><textarea id="hq0" data-i="0" spellcheck="false"></textarea>';
  el.innerHTML='<h2>« '+esc(payload.name||"Humain")+' » attend tes réponses</h2>'
    +'<div class="hsub">'+(qs?qs.length+" question"+(qs.length>1?"s":"")+" · ":"")+'Ctrl/Cmd+Entrée pour continuer</div>'
    +fields
    +'<div class="hacts"><button class="go" id="hgo">'+ic('play_arrow')+' Continuer</button>'
    +'<button class="cancel" id="hcancel">Passer (réponses vides)</button></div>';
  el.hidden=false; requestAnimationFrame(()=>el.classList.add("show"));
  const key=runMap[payload.id];
  const cardEl=key!=null?document.querySelector('[data-key="'+key+'"]'):null;
  if(cardEl)cardEl.scrollIntoView({block:"center",behavior:"smooth"});
  const first=el.querySelector("textarea"); if(first)first.focus();
  document.getElementById("hgo").onclick=submitHitl;
  document.getElementById("hcancel").onclick=cancelHitl;
}
function collectHitl(){
  return [...document.getElementById("hitl").querySelectorAll("textarea")]
    .sort((a,b)=>a.dataset.i-b.dataset.i).map(a=>a.value.trim());
}
function closeHitl(){ const el=document.getElementById("hitl");
  el.classList.remove("show"); el.hidden=true; el.innerHTML=""; hitlCtx=null; }
function submitHitl(){
  if(!hitlCtx)return;
  const vals=collectHitl();
  const payload=Array.isArray(hitlCtx.questions)?{answers:vals}:{comment:vals[0]||""};
  vscode.postMessage({type:"hitl_answer",id:hitlCtx.id,payload});
  closeHitl();
}
function cancelHitl(){
  if(!hitlCtx)return;
  const payload=Array.isArray(hitlCtx.questions)
    ?{answers:hitlCtx.questions.map(()=>"")}:{comment:""};
  vscode.postMessage({type:"hitl_answer",id:hitlCtx.id,payload});
  closeHitl();
}
addEventListener("keydown",e=>{
  if(!hitlCtx)return;
  if((e.metaKey||e.ctrlKey)&&e.key==="Enter"){e.preventDefault();submitHitl();return;}
  if(e.key==="Tab"){
    const f=[...document.getElementById("hitl").querySelectorAll("textarea,button")];
    if(!f.length)return;
    const first=f[0],last=f[f.length-1];
    if(e.shiftKey&&document.activeElement===first){e.preventDefault();last.focus();}
    else if(!e.shiftKey&&document.activeElement===last){e.preventDefault();first.focus();}
  }
},true);

/* ---------- clavier global ---------- */
addEventListener("keydown",e=>{
  if(["INPUT","TEXTAREA"].includes(e.target.tagName))return;
  if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==="z"){e.preventDefault();
    e.shiftKey?doRedo():doUndo();return;}
  if(e.key==="Escape"){
    if(menuOpen)closeMenu();
    else if(!hitlCtx&&open){open=null;render();}
  }
});

/* ---------- messages de l'hôte ---------- */
addEventListener("message",e=>{
  const m=e.data;
  if(m.type==="agents"){AGENTS=m.agents||[];}
  else if(m.type==="pipelines"){PIPES=m.pipelines||[];}
  else if(m.type==="event"){onEvent(m.event);}
  else if(m.type==="hitl_ask"){showHitl(m);}
  else if(m.type==="saved"){toast("Sauvé : "+m.name);}
  else if(m.type==="toast"){toast(m.text);}
  else if(m.type==="noclaude"){claudeMissing=true;
    document.getElementById("banner").hidden=false;
    bRun.disabled=true;bRun.title="`claude` introuvable dans le PATH";}
});

state=loadState()||Object.assign({entree:""},structuredClone(EXEMPLE));
render();
vscode.postMessage({type:"ready"});
</script>
