<title>Orchestrateur ideas.py — schéma interactif</title>
<style>
  :root{
    --ground:#eef1f6; --dot:rgba(30,45,80,.10);
    --card:#ffffff; --card-2:#f7f9fc;
    --ink:#171e2a; --muted:#5d6b7e; --hair:#dbe2ec; --line:#b7c1d1;
    --llm:#6d4bff; --human:#d98a12; --io:#1f9463; --web:#2f7ef2;
    --ring:rgba(109,75,255,.35);
    --sans:"Segoe UI",system-ui,-apple-system,"Helvetica Neue",Arial,sans-serif;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
    --shadow:0 1px 2px rgba(20,30,55,.06),0 8px 24px rgba(20,30,55,.10);
  }
  @media (prefers-color-scheme:dark){
    :root{
      --ground:#0f131b; --dot:rgba(150,175,220,.09);
      --card:#1a212d; --card-2:#212a38;
      --ink:#e7ecf4; --muted:#93a1b5; --hair:#2a3444; --line:#3a4557;
      --llm:#957dff; --human:#efb04a; --io:#3cc487; --web:#5b9dff;
      --ring:rgba(149,125,255,.45);
      --shadow:0 1px 2px rgba(0,0,0,.4),0 10px 28px rgba(0,0,0,.45);
    }
  }
  :root[data-theme="light"]{
    --ground:#eef1f6; --dot:rgba(30,45,80,.10);
    --card:#ffffff; --card-2:#f7f9fc; --ink:#171e2a; --muted:#5d6b7e;
    --hair:#dbe2ec; --line:#b7c1d1; --llm:#6d4bff; --human:#d98a12;
    --io:#1f9463; --web:#2f7ef2; --ring:rgba(109,75,255,.35);
    --shadow:0 1px 2px rgba(20,30,55,.06),0 8px 24px rgba(20,30,55,.10);
  }
  :root[data-theme="dark"]{
    --ground:#0f131b; --dot:rgba(150,175,220,.09);
    --card:#1a212d; --card-2:#212a38; --ink:#e7ecf4; --muted:#93a1b5;
    --hair:#2a3444; --line:#3a4557; --llm:#957dff; --human:#efb04a;
    --io:#3cc487; --web:#5b9dff; --ring:rgba(149,125,255,.45);
    --shadow:0 1px 2px rgba(0,0,0,.4),0 10px 28px rgba(0,0,0,.45);
  }

  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--ground);color:var(--ink);font-family:var(--sans);
    -webkit-font-smoothing:antialiased;overflow:hidden}
  .app{display:flex;flex-direction:column;height:100vh}

  .topbar{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;
    padding:14px 20px;border-bottom:1px solid var(--hair);background:var(--card);
    z-index:5}
  .topbar h1{margin:0;font-size:16px;font-weight:650;letter-spacing:-.01em}
  .topbar .file{font-family:var(--mono);font-size:12.5px;color:var(--llm);
    background:color-mix(in srgb,var(--llm) 12%,transparent);
    padding:2px 8px;border-radius:6px}
  .topbar .sub{font-size:12.5px;color:var(--muted);margin-left:auto}

  .workspace{flex:1;display:flex;min-height:0}
  .stage{position:relative;flex:1;min-width:0;overflow:hidden;cursor:grab;
    background-image:radial-gradient(circle,var(--dot) 1.4px,transparent 1.5px);
    background-size:22px 22px}
  .stage.panning{cursor:grabbing}

  .viewport{position:absolute;top:0;left:0;width:1380px;height:560px;
    transform-origin:0 0;will-change:transform}

  .edges{position:absolute;top:0;left:0;overflow:visible;pointer-events:none}
  .edges path{fill:none;stroke:var(--line);stroke-width:2;
    transition:stroke .15s,opacity .15s,stroke-width .15s}

  .frame{position:absolute;border:1.5px dashed var(--line);border-radius:16px;
    background:color-mix(in srgb,var(--llm) 4%,transparent)}
  .frame .flabel{position:absolute;top:-11px;left:16px;font-family:var(--mono);
    font-size:11px;color:var(--muted);background:var(--ground);padding:0 8px;
    letter-spacing:.01em}

  .node{position:absolute;width:180px;background:var(--card);
    border:1px solid var(--hair);border-radius:13px;box-shadow:var(--shadow);
    padding:11px 12px 12px;cursor:pointer;text-align:left;font:inherit;color:inherit;
    display:flex;flex-direction:column;gap:5px;
    transition:transform .12s,box-shadow .12s,border-color .12s,opacity .15s;
    border-top:3px solid var(--nc,var(--line))}
  .node:hover{transform:translateY(-2px)}
  .node:focus-visible{outline:none;border-color:var(--nc);box-shadow:0 0 0 3px var(--ring),var(--shadow)}
  .node.selected{border-color:var(--nc);box-shadow:0 0 0 3px var(--ring),var(--shadow)}
  .node .head{display:flex;align-items:center;gap:8px}
  .node .ico{font-size:16px;line-height:1;filter:saturate(1.1)}
  .node .ttl{font-size:13.5px;font-weight:640;letter-spacing:-.01em}
  .node .sub{font-family:var(--mono);font-size:11px;color:var(--muted);
    line-height:1.35;word-break:break-word}
  .node .tag{align-self:flex-start;font-family:var(--mono);font-size:10px;
    color:var(--web);background:color-mix(in srgb,var(--web) 14%,transparent);
    padding:1px 6px;border-radius:5px;letter-spacing:.02em}

  .viewport.hl .node:not(.hot){opacity:.4}
  .viewport.hl .edges path:not(.hot){opacity:.14}
  .edges path.hot{stroke:var(--llm);stroke-width:2.6}

  .controls{position:absolute;top:14px;right:14px;display:flex;gap:6px;z-index:4}
  .controls button{width:34px;height:34px;border:1px solid var(--hair);
    background:var(--card);color:var(--ink);border-radius:9px;cursor:pointer;
    font-size:15px;display:grid;place-items:center;box-shadow:var(--shadow)}
  .controls button:hover{border-color:var(--line)}
  .controls button:focus-visible{outline:none;box-shadow:0 0 0 3px var(--ring)}

  .legend{position:absolute;left:14px;bottom:14px;display:flex;gap:14px;
    flex-wrap:wrap;align-items:center;background:color-mix(in srgb,var(--card) 88%,transparent);
    border:1px solid var(--hair);border-radius:10px;padding:8px 12px;
    font-size:11.5px;color:var(--muted);backdrop-filter:blur(4px);z-index:4}
  .legend b{color:var(--ink);font-weight:600}
  .legend .it{display:flex;align-items:center;gap:6px}
  .legend .sw{width:11px;height:11px;border-radius:3px;display:inline-block}
  .legend .dash{width:16px;border-top:1.5px dashed var(--line)}

  .panel{width:340px;flex-shrink:0;border-left:1px solid var(--hair);
    background:var(--card);display:flex;flex-direction:column;min-height:0}
  .panel .ph{padding:16px 18px 12px;border-bottom:1px solid var(--hair);
    display:flex;align-items:center;gap:10px}
  .panel .ph .ico{font-size:22px}
  .panel .ph .pt{font-size:15px;font-weight:660;letter-spacing:-.01em}
  .panel .ph .pk{font-family:var(--mono);font-size:11px;color:var(--muted)}
  .panel .pb{padding:16px 18px;overflow:auto;display:flex;flex-direction:column;gap:15px}
  .panel .empty{color:var(--muted);font-size:13px;line-height:1.5;padding:22px 18px}
  .field .k{font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;
    color:var(--muted);margin-bottom:4px;font-weight:600}
  .field .v{font-size:13px;line-height:1.5}
  .field .v code,.mono{font-family:var(--mono);font-size:12px;
    background:var(--card-2);border:1px solid var(--hair);border-radius:5px;
    padding:1px 5px}
  .chips{display:flex;gap:6px;flex-wrap:wrap}
  .chip{font-size:11px;font-family:var(--mono);padding:3px 8px;border-radius:6px;
    border:1px solid transparent}
  .chip.llm{color:var(--llm);background:color-mix(in srgb,var(--llm) 12%,transparent);
    border-color:color-mix(in srgb,var(--llm) 26%,transparent)}
  .chip.no{color:var(--muted);background:var(--card-2);border-color:var(--hair)}
  .chip.web{color:var(--web);background:color-mix(in srgb,var(--web) 12%,transparent);
    border-color:color-mix(in srgb,var(--web) 26%,transparent)}
  .chip.human{color:var(--human);background:color-mix(in srgb,var(--human) 14%,transparent);
    border-color:color-mix(in srgb,var(--human) 30%,transparent)}
  .chip.io{color:var(--io);background:color-mix(in srgb,var(--io) 12%,transparent);
    border-color:color-mix(in srgb,var(--io) 28%,transparent)}
  .flow{display:flex;align-items:center;gap:7px;flex-wrap:wrap;font-size:12.5px}
  .flow .a{font-family:var(--mono);font-size:11.5px;background:var(--card-2);
    border:1px solid var(--hair);border-radius:6px;padding:3px 7px}
  .flow .ar{color:var(--muted)}

  @media (max-width:820px){
    .workspace{flex-direction:column}
    .panel{width:auto;border-left:none;border-top:1px solid var(--hair);
      max-height:42vh}
    .legend{display:none}
  }
  @media (prefers-reduced-motion:reduce){
    *{transition:none!important;animation:none!important}
  }
</style>

<div class="app">
  <header class="topbar">
    <h1>Orchestrateur d'agents</h1>
    <span class="file">ideas.py</span>
    <span class="sub">Flux déterministe · 5 étapes · backend <span style="font-family:var(--mono)">claude&nbsp;-p</span></span>
  </header>

  <div class="workspace">
    <div class="stage" id="stage">
      <div class="viewport" id="viewport">
        <svg class="edges" id="edges" width="1380" height="560"></svg>
      </div>
      <div class="controls">
        <button id="zout" title="Dézoomer" aria-label="Dézoomer">–</button>
        <button id="zfit" title="Ajuster" aria-label="Ajuster la vue">⤢</button>
        <button id="zin" title="Zoomer" aria-label="Zoomer">+</button>
      </div>
      <div class="legend">
        <span class="it"><span class="sw" style="background:var(--llm)"></span> <b>Appel LLM</b></span>
        <span class="it"><span class="sw" style="background:var(--human)"></span> <b>Humain (HITL)</b></span>
        <span class="it"><span class="sw" style="background:var(--io)"></span> <b>Entrée / Sortie</b></span>
        <span class="it"><span class="sw" style="background:var(--web)"></span> <b>🌐 WebSearch</b> si <code class="mono" style="border:none;padding:0;background:none;color:var(--web)">--web</code></span>
        <span class="it"><span class="dash"></span> parallèle</span>
      </div>
    </div>

    <aside class="panel" id="panel">
      <div class="empty" id="empty">Clique un nœud du schéma pour en voir le détail : son rôle, ses entrées/sorties, et s'il déclenche un appel au modèle.</div>
      <div id="pcontent" style="display:none">
        <div class="ph"><span class="ico" id="pico"></span><div><div class="pt" id="ptitle"></div><div class="pk" id="pkind"></div></div></div>
        <div class="pb" id="pbody"></div>
      </div>
    </aside>
  </div>
</div>

<script>
const W=1380,H=560;
const COL={llm:"var(--llm)",human:"var(--human)",io:"var(--io)",web:"var(--web)"};

const NODES=[
  {id:"intake",x:30,y:235,ico:"💡",ttl:"Idée",sub:'ideas.py "…"',c:"io",
   d:{kind:"Étape 1 · Entrée CLI",llm:false,role:"L'idée est passée en argument de la ligne de commande. Aucune persistance, aucune base de données.",
      inp:"argv",out:"idee (str)",ref:"argparse · main()"}},
  {id:"quest",x:250,y:235,ico:"❓",ttl:"Questionnaire",sub:"1 appel LLM · 5–7 Q",c:"llm",
   d:{kind:"Étape 2 · Appel LLM (sortie structurée)",llm:true,
      role:"Génère 5 à 7 questions de cadrage SUR-MESURE au domaine détecté de l'idée — pas de questions génériques.",
      inp:"idee",out:'{"questions":[…]}',ref:"questionnaire()"}},
  {id:"gate",x:470,y:235,ico:"🧑",ttl:"Gate HITL",sub:"réponses 1 par 1",c:"human",
   d:{kind:"Étape 2 · Human-in-the-loop",llm:false,
      role:"Le CLI pose chaque question au clavier, une par une. Entrée vide = la question est passée (« non précisé »). Idée + Q/R = le brief.",
      inp:"questions",out:"brief",ref:"poser_questions()"}},

  {id:"marche",x:700,y:40,ico:"📊",ttl:"Marché",sub:"TAM · SAM · SOM",c:"llm",web:true,
   d:{kind:"Étape 3 · Worker parallèle",llm:true,web:true,
      role:"TAM / SAM / SOM estimés, concurrents principaux, tendances, positionnement recommandé.",
      inp:"brief",out:"section Markdown",ref:'worker("Marché", …)'}},
  {id:"chiffrage",x:700,y:170,ico:"💰",ttl:"Chiffrage",sub:"coûts · break-even",c:"llm",web:true,
   d:{kind:"Étape 3 · Worker parallèle",llm:true,web:true,
      role:"Coûts de démarrage, modèle de revenus, hypothèses de prix, seuil de rentabilité. Chaque chiffre marqué « estimation à valider ».",
      inp:"brief",out:"section Markdown",ref:'worker("Chiffrage", …)'}},
  {id:"plan",x:700,y:300,ico:"🗺️",ttl:"Plan",sub:"MVP · jalons",c:"llm",
   d:{kind:"Étape 3 · Worker parallèle",llm:true,
      role:"MVP, étapes concrètes, jalons, séquencement, premières actions.",
      inp:"brief",out:"section Markdown",ref:'worker("Plan", …)'}},
  {id:"traj",x:700,y:430,ico:"🔮",ttl:"Trajectoires",sub:"3 scénarios",c:"llm",
   d:{kind:"Étape 3 · Worker parallèle",llm:true,
      role:"3 scénarios — prudent / réaliste / ambitieux — avec ce qui les distingue (investissement, rythme, risques, issue).",
      inp:"brief",out:"section Markdown",ref:'worker("Trajectoires", …)'}},

  {id:"synth",x:965,y:235,ico:"🧩",ttl:"Synthèse",sub:"1 appel LLM",c:"llm",
   d:{kind:"Étape 4 · Appel LLM",llm:true,
      role:"Assemble les 4 sections + le brief en un rapport cohérent : reformulation, les 4 parties, puis une reco go / no-go nuancée.",
      inp:"brief + 4 sections",out:"reformulation + synthèse",ref:"synthese()"}},
  {id:"output",x:1170,y:235,ico:"📄",ttl:"Rapport",sub:"rapport-<slug>.md",c:"io",
   d:{kind:"Étape 5 · Sortie fichier",llm:false,
      role:"Écrit le seul artefact produit : le Markdown final, à 7 sections.",
      inp:"tout",out:"rapport-<slug>.md",ref:"main()"}},
];
const EDGES=[
  ["intake","quest"],["quest","gate"],
  ["gate","marche"],["gate","chiffrage"],["gate","plan"],["gate","traj"],
  ["marche","synth"],["chiffrage","synth"],["plan","synth"],["traj","synth"],
  ["synth","output"],
];
const FRAME={x:685,y:18,w:210,h:500,label:"asyncio.gather() — 4 workers en parallèle"};
const NW=180,NH=74;
const byId=Object.fromEntries(NODES.map(n=>[n.id,n]));

const viewport=document.getElementById("viewport");
const edgesSvg=document.getElementById("edges");

// frame
const fr=document.createElement("div");
fr.className="frame";
fr.style.cssText=`left:${FRAME.x}px;top:${FRAME.y}px;width:${FRAME.w}px;height:${FRAME.h}px`;
fr.innerHTML=`<span class="flabel">${FRAME.label}</span>`;
viewport.appendChild(fr);

// edges
function anchors(a,b){return {x1:a.x+NW,y1:a.y+NH/2,x2:b.x,y2:b.y+NH/2};}
for(const [f,t] of EDGES){
  const {x1,y1,x2,y2}=anchors(byId[f],byId[t]);
  const k=Math.max(45,(x2-x1)*0.45);
  const p=document.createElementNS("http://www.w3.org/2000/svg","path");
  p.setAttribute("d",`M ${x1} ${y1} C ${x1+k} ${y1}, ${x2-k} ${y2}, ${x2} ${y2}`);
  p.dataset.from=f;p.dataset.to=t;
  edgesSvg.appendChild(p);
}

// nodes
for(const n of NODES){
  const el=document.createElement("button");
  el.className="node";el.id="n-"+n.id;el.dataset.id=n.id;
  el.style.cssText=`left:${n.x}px;top:${n.y}px;--nc:${COL[n.c]}`;
  el.setAttribute("aria-label",n.ttl+" — "+n.d.kind);
  el.innerHTML=`<div class="head"><span class="ico">${n.ico}</span>
      <span class="ttl">${n.ttl}</span></div>
    <span class="sub">${n.sub}</span>
    ${n.web?'<span class="tag">🌐 --web</span>':''}`;
  el.addEventListener("click",e=>{e.stopPropagation();select(n.id);});
  el.addEventListener("mouseenter",()=>hover(n.id));
  el.addEventListener("mouseleave",clearHover);
  el.addEventListener("focus",()=>hover(n.id));
  el.addEventListener("blur",clearHover);
  viewport.appendChild(el);
}

// hover highlight
function hover(id){
  viewport.classList.add("hl");
  const hot=new Set([id]);
  edgesSvg.querySelectorAll("path").forEach(p=>{
    const on=p.dataset.from===id||p.dataset.to===id;
    p.classList.toggle("hot",on);
    if(on){hot.add(p.dataset.from);hot.add(p.dataset.to);}
  });
  NODES.forEach(n=>document.getElementById("n-"+n.id)
    .classList.toggle("hot",hot.has(n.id)));
}
function clearHover(){
  viewport.classList.remove("hl");
  edgesSvg.querySelectorAll("path.hot").forEach(p=>p.classList.remove("hot"));
  document.querySelectorAll(".node.hot").forEach(n=>n.classList.remove("hot"));
}

// selection / panel
const empty=document.getElementById("empty"),pc=document.getElementById("pcontent");
let selected=null;
function select(id){
  if(selected)document.getElementById("n-"+selected).classList.remove("selected");
  selected=id;
  const n=byId[id],d=n.d;
  document.getElementById("n-"+id).classList.add("selected");
  empty.style.display="none";pc.style.display="block";
  document.getElementById("pico").textContent=n.ico;
  document.getElementById("ptitle").textContent=n.ttl;
  document.getElementById("pkind").textContent=d.kind;
  const chips=[];
  chips.push(d.llm?'<span class="chip llm">appel LLM</span>'
    :(n.c==="human"?'<span class="chip human">humain</span>'
    :'<span class="chip io">code · pas de LLM</span>'));
  if(d.web)chips.push('<span class="chip web">🌐 WebSearch si --web</span>');
  document.getElementById("pbody").innerHTML=`
    <div class="field"><div class="k">Rôle</div><div class="v">${d.role}</div></div>
    <div class="chips">${chips.join("")}</div>
    <div class="field"><div class="k">Entrée → Sortie</div>
      <div class="flow"><span class="a">${d.inp}</span><span class="ar">→</span><span class="a">${d.out}</span></div></div>
    <div class="field"><div class="k">Dans le code</div><div class="v"><code>${d.ref}</code></div></div>`;
}
document.getElementById("stage").addEventListener("click",()=>{
  if(selected){document.getElementById("n-"+selected).classList.remove("selected");selected=null;}
  empty.style.display="block";pc.style.display="none";
});
addEventListener("keydown",e=>{if(e.key==="Escape"&&selected){
  document.getElementById("stage").click();}});

// pan + zoom
const stage=document.getElementById("stage");
let tx=0,ty=0,sc=1;
function apply(){viewport.style.transform=`translate(${tx}px,${ty}px) scale(${sc})`;}
function fit(){
  const r=stage.getBoundingClientRect();
  sc=Math.min(r.width/W,r.height/H)*0.9;
  sc=Math.max(.35,Math.min(sc,1.4));
  tx=(r.width-W*sc)/2;ty=(r.height-H*sc)/2;apply();
}
function zoomAt(cx,cy,f){
  const ns=Math.max(.35,Math.min(2.2,sc*f));
  tx=cx-(cx-tx)*(ns/sc);ty=cy-(cy-ty)*(ns/sc);sc=ns;apply();
}
stage.addEventListener("wheel",e=>{
  e.preventDefault();const r=stage.getBoundingClientRect();
  zoomAt(e.clientX-r.left,e.clientY-r.top,e.deltaY<0?1.12:1/1.12);
},{passive:false});
document.getElementById("zin").onclick=()=>{const r=stage.getBoundingClientRect();zoomAt(r.width/2,r.height/2,1.2);};
document.getElementById("zout").onclick=()=>{const r=stage.getBoundingClientRect();zoomAt(r.width/2,r.height/2,1/1.2);};
document.getElementById("zfit").onclick=fit;

let pan=null,moved=false;
stage.addEventListener("pointerdown",e=>{
  if(e.target.closest(".node"))return;
  pan={x:e.clientX,y:e.clientY,tx,ty};moved=false;
  stage.classList.add("panning");stage.setPointerCapture(e.pointerId);
});
stage.addEventListener("pointermove",e=>{
  if(!pan)return;
  const dx=e.clientX-pan.x,dy=e.clientY-pan.y;
  if(Math.abs(dx)+Math.abs(dy)>4)moved=true;
  tx=pan.tx+dx;ty=pan.ty+dy;apply();
});
function endPan(){pan=null;stage.classList.remove("panning");}
stage.addEventListener("pointerup",endPan);
stage.addEventListener("pointercancel",endPan);

addEventListener("resize",fit);
fit();
</script>
