name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

defaults:
  run:
    working-directory: vscode-agentlab

jobs:
  # Tests moteur + garde-fou webview, sur les 3 OS et 3 versions de Node.
  # Aucune dépendance runtime → pas de `npm install`, juste `node --test`.
  test:
    name: test · ${{ matrix.os }} · node ${{ matrix.node }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18, 20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: node --test

  # Vérifie que l'extension se package réellement (le .vsix se construit).
  package:
    name: package .vsix
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npx --yes @vscode/vsce package --no-dependencies
      - uses: actions/upload-artifact@v4
        with:
          name: agentlab-vsix
          path: vscode-agentlab/*.vsix
